<!DOCTYPE html>
<html>
<head>
  <title>GrowUp AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0F172A;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      background: black;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px;
      margin: 5px 0;
      border-radius: 12px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .user {
      background: #2563EB;
      align-self: flex-end;
    }

    .ai {
      background: #1E293B;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: black;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 8px;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>🚀 GrowUp AI</header>

<div id="messages"></div>

<div class="input-box">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const msg = input.value;

  if (!msg) return;

  addMessage(msg, "user");

  // Loading message
  const loadingId = addMessage("Typing...", "ai");

  try {
    const res = await fetch("http://localhost:10000/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    updateMessage(loadingId, data.reply);
  } catch (error) {
    updateMessage(loadingId, "Error connecting to server");
  }

  input.value = "";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("messages").appendChild(div);
  div.scrollIntoView();

  return div;
}

function updateMessage(div, newText) {
  div.innerText = newText;
}
</script>

</body>
</html>
